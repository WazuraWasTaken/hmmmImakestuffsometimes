- type: entity
  name: trained cortical borer
  parent: MobCorticalBorer
  id: MobCorticalBorerPet
  description: A worm that burrows into brains and lays its eggs. This one appears tamed.
  suffix: Pet
  components:
  - type: NpcFactionMember
    factions:
      - Critter
  - type: LanguageKnowledge
    speaks:
    - Xeno
    understands:
    - TauCetiBasic
    - Xeno
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-pet-cortical-borer-name
    description: ghost-role-information-pet-kinky-description
    rules: ghost-role-information-cortical-borer-familiar-rules
  - type: Item
    size: Tiny
  - type: CorticalBorer
    eggProto: "CorticalBorerEggPet"
    addOnInfest:
    - type: PressureImmunity
    removeOnInfest:
    - type: CanEscapeInventory
